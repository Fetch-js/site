<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fetch.js - Loading</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="fetch.js" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <script>
        let savedLang = localStorage.getItem('user_lang');
        if (!savedLang){
            const browserLang = navigator.language || navigator.userLanguage;
            const shortLang = browserLang.split('-')[0];
            savedLang = (shortLang === 'ru') ? 'ru' : 'en';
            localStorage.setItem('user_lang',savedLang)
        }
        window.location.replace('index_'+savedLang+'.html');
    </script>
</head>
